# Generated starter workflow — commit with your Terraform root at the repository root (same folder as versions.tf).
# Setup: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure
name: Terraform CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      # OIDC (recommended): add federated credential on the app registration for GitHub, then set these repo secrets.
      # Alternative: use client_secret with azure/login "enable-AzPSSession" or ARM_* env vars — see azure/login docs.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format (check)
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
        if: always()
